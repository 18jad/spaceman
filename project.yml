name: SpaceMan
options:
  bundleIdPrefix: com.spaceman
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  SpaceMan:
    type: application
    platform: macOS
    sources:
      - SpaceMan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spaceman.app
        PRODUCT_NAME: SpaceMan
        INFOPLIST_FILE: SpaceMan/Info.plist
        CODE_SIGN_ENTITLEMENTS: SpaceMan/SpaceMan.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        SWIFT_STRICT_CONCURRENCY: minimal
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
